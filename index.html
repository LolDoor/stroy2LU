<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STROY REZERV - Загрузка сервера</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/4000/ss_af060d0a9aeb6598e154c9704ce250b0e63b2266.1920x1080.jpg?t=1764757984') 
                        center/cover no-repeat fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* Логотип в левом верхнем углу */
        .logo {
            position: absolute;
            top: 20px;
            left: 25px;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 3px;
            color: #fff;
            text-shadow: 
                0 0 10px rgba(255, 215, 0, 0.8),
                0 0 20px rgba(255, 215, 0, 0.6),
                0 0 30px rgba(255, 215, 0, 0.4),
                2px 2px 4px rgba(0, 0, 0, 0.8);
            animation: pulse 2s ease-in-out infinite;
            z-index: 10;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.85; }
        }

        /* Основной текст */
        .loading-text {
            font-size: 1.8rem;
            font-weight: 500;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.9);
            margin-bottom: 40px;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Контейнер спиннера */
        .spinner-container {
            position: absolute;
            bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        /* Вечный спиннер */
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .spinner-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.85);
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
            animation: fadeIn 1.5s ease-out;
        }

        /* Декоративная линия под лого */
        .logo::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ffd700, transparent);
            border-radius: 1px;
        }

        /* Адаптивность для разных разрешений */
        @media (max-width: 1280px) {
            .logo { font-size: 1.8rem; }
            .loading-text { font-size: 1.5rem; }
            .spinner { width: 40px; height: 40px; }
        }

        @media (max-height: 720px) {
            .loading-text { margin-bottom: 25px; font-size: 1.4rem; }
            .spinner-container { bottom: 20px; }
        }
    </style>
</head>
<body>
    <!-- Логотип сервера -->
    <div class="logo">STROY REZERV</div>

    <!-- Основной текст загрузки -->
    <div class="loading-text">Подождите, идёт загрузка сервера</div>

    <!-- Спиннер загрузки -->
    <div class="spinner-container">
        <div class="spinner"></div>
        <div class="spinner-label">Загрузка ресурсов...</div>
    </div>
	<!-- 🔊 Фоновая музыка (зацикленная) -->
<audio id="bgMusic" loop preload="auto">
  <source src="https://loldoor.github.io/stroy2LU/Muzon.mp3" type="audio/mpeg">
  Ваш браузер не поддерживает аудио-элемент.
</audio>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const audio = document.getElementById('bgMusic');
    audio.volume = 0.35; // Громкость: 0.0 (тихо) — 1.0 (громко)
    
    // Пытаемся запустить автоматически
    audio.play().catch(function(error) {
      console.log('Autoplay заблокирован браузером:', error);
      // Это нормально — многие браузеры блокируют звук без клика
      // Если нужно, можем добавить кнопку включения
    });
  });
</script>
</body>
</html>
